<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nixor Assessors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f7f5f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .logo {
      margin-bottom: 30px;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 2px;
    }

    .logo span {
      color: #c07a2c;
      font-weight: 400;
    }

    .card {
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 20px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      margin-top: 0;
      color: #2f3a4c;
      font-size: 36px;
      margin-bottom: 25px;
    }

    .message {
      font-size: 20px;
      color: #4f46e5;
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      background-color: #16a34a;
      border-radius: 50%;
      margin-right: 10px;
      position: relative;
      top: -2px;
    }

    .note {
      margin-top: 20px;
      font-size: 16px;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      .card {
        margin: 20px;
        padding: 30px 20px;
      }

      h1 {
        font-size: 28px;
      }

      .message {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="logo">
    NIXOR <span>assessors</span>
  </div>

  <div class="card">
    <h1>¡Solicitud enviada!</h1>

    <div class="message">
      <span class="dot"></span>
      Tus datos han sido enviados correctamente. Recibirás en tu correo electrónico un enlace para realizar una breve entrevista.
    </div>

    <div class="note">
      Por favor, revisa tu carpeta de spam si no lo encuentras en tu bandeja principal.
    </div>
  </div>

</body>
</html>
