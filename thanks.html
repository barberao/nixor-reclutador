<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nixor Assessors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f3f4f8;
      --card: #ffffff;
      --text-main: #24304f;
      --text-accent: #5450c8;
      --text-muted: #6b7280;
      --brand-dark: #3b241d;
      --brand-gold: #c7832f;
      --success: #18b533;
      --border: #dfe3eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 36px 20px 60px;
    }

    .logo-wrap {
      margin-bottom: 34px;
      text-align: center;
    }

    .logo-text {
      font-size: 32px;
      letter-spacing: 1px;
      font-weight: 300;
      color: var(--brand-dark);
    }

    .logo-text span {
      color: var(--brand-gold);
      font-weight: 300;
    }

    .card {
      width: 100%;
      max-width: 1120px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 72px 64px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.04);
    }

    h1 {
      margin: 0 0 28px;
      font-size: 64px;
      line-height: 1.05;
      font-weight: 300;
      color: var(--text-main);
    }

    .message {
      margin: 0 auto;
      max-width: 900px;
      font-size: 31px;
      line-height: 1.55;
      color: var(--text-accent);
      font-weight: 400;
    }

    .intro {
      display: inline;
    }

    .dot {
      display: inline-block;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2ae64c, #0b9c1f);
      margin-right: 14px;
      vertical-align: middle;
      transform: translateY(-2px);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.35);
    }

    .name {
      font-weight: 500;
    }

    .note {
      margin-top: 18px;
    }

    @media (max-width: 900px) {
      .card {
        padding: 48px 28px;
        border-radius: 24px;
      }

      h1 {
        font-size: 44px;
      }

      .message {
        font-size: 24px;
      }

      .dot {
        width: 22px;
        height: 22px;
      }

      .logo-text {
        font-size: 26px;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 24px 14px 40px;
      }

      .card {
        padding: 34px 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 34px;
        margin-bottom: 20px;
      }

      .message {
        font-size: 18px;
        line-height: 1.65;
      }

      .dot {
        width: 16px;
        height: 16px;
        margin-right: 10px;
      }

      .logo-text {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <!-- Opción texto -->
    <div class="logo-text">NIXOR <span>assessors</span></div>

    <!-- Si prefieres imagen, sustituye el bloque anterior por algo como esto:
    <img src="logo-nixor.png" alt="Nixor Assessors" style="max-width: 280px; height: auto;">
    -->
  </div>

  <main class="card">
    <h1>¡Solicitud enviada!</h1>

    <p class="message">
      <span class="dot" aria-hidden="true"></span>
      <span class="intro" id="introText">
        Tus datos han sido enviados correctamente.
      </span>
      Recibirás en tu correo electrónico un enlace para realizar una breve entrevista.
      <span class="note">Por favor, revisa tu carpeta de spam.</span>
    </p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawName = params.get('name');

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    if (rawName && rawName.trim()) {
      const safeName = escapeHtml(rawName.trim());
      document.getElementById('introText').innerHTML =
        `Gracias, <span class="name">${safeName}</span>. Tus datos han sido enviados correctamente.`;
    }
  </script>

</body>
</html>
